<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stereo + VR</title>
<style>
html, body { height: 100%; margin: 0; background: #0e1116; overflow: hidden; }
canvas { display: block; }
.hud { 
    position: fixed; 
    left: 12px;
    top: 12px; 
    z-index: 10; 
    padding: 8px; 
    border: 1px solid #e6ebf3; 
    background: #013486; 
    border-radius: 10px; 
    color: #e6ebf3; 
    font-family: sans-serif;
}
#stereoBtn {
    padding: 6px 12px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #e6ebf3;
    color: #013486;
    margin-bottom: 6px;
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div class="hud">
    <button id="stereoBtn">Stereo Aç/Kapat</button>
    <div id="vrContainer"></div>
</div>

<script type="module">
import * as THREE from "three";
import { StereoEffect } from "three/addons/effects/StereoEffect.js";
import { VRButton } from "three/addons/webxr/VRButton.js";

const sizes = { w: window.innerWidth, h: window.innerHeight };

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(sizes.w, sizes.h);
renderer.xr.enabled = true; // VR özelliği açıldı
document.body.appendChild(renderer.domElement);

// VR butonunu ekle
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1116);

const camera = new THREE.PerspectiveCamera(75, sizes.w / sizes.h, 0.1, 1000);
camera.position.set(0, 0.6, 4);
scene.add(camera);

scene.add(new THREE.GridHelper(20, 20, 0x334155, 0x1f2937));
scene.add(new THREE.AxesHelper(2.5));

const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.2, 1.2),
    new THREE.MeshNormalMaterial()
);
scene.add(cube);
camera.lookAt(cube.position);

const effect = new StereoEffect(renderer);
effect.setSize(sizes.w, sizes.h);

let useStereo = false;

window.addEventListener("resize", () => {
    sizes.w = window.innerWidth;
    sizes.h = window.innerHeight;

    camera.aspect = sizes.w / sizes.h;
    camera.updateProjectionMatrix();

    renderer.setSize(sizes.w, sizes.h);
    effect.setSize(sizes.w, sizes.h);
});

// Stereo butonu
const btn = document.getElementById("stereoBtn");
btn.addEventListener("click", () => {
    useStereo = !useStereo;
    console.log("Stereo Mode:", useStereo);
});

// Animasyon
let t = 0;
function animate() {
    renderer.setAnimationLoop(animate); // VR uyumlu

    t += 0.01;
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.015;
    cube.rotation.z += Math.sin(t) * 0.05;

    if (useStereo && !renderer.xr.isPresenting) {
        effect.render(scene, camera);
    } else {
        renderer.render(scene, camera);
    }
}

animate();
</script>
</body>
</html>
